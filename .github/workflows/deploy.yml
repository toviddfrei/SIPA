name: SIPAweb Auto-Deploy

on:
  push:
    branches: [ main ]
    # Se activa solo cuando hay cambios en el código de la web
    paths:
      - 'external/SIPAweb/**'
    paths-ignore:
      - 'README.md'
      - 'external/SIPAweb/docs/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        # Indicamos que el archivo está dentro de la subcarpeta
        working-directory: external/SIPAweb

      - name: Ejecutar Motor SIPAweb
        run: python sipaweb.py
        # Ejecutamos el script desde su carpeta para que las rutas relativas no fallen
        working-directory: external/SIPAweb

      - name: Desplegar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Importante: publicar solo lo que genera el motor
          publish_dir: ./external/SIPAweb
          publish_branch: gh-pages